services:
  postgres:
    image: postgres:16-alpine
    container_name: med_postgres
    environment:
      POSTGRES_USER: med_user
      POSTGRES_PASSWORD: med_password
      POSTGRES_DB: med_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U med_user -d med_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
